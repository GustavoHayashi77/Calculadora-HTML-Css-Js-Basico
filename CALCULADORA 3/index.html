<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer ></script>
</head>
<body>
    <section class="wrapper">
        <div class="display" id="current_operation">
            
        </div>
        <div class="buttons">
            <button class="clear" onclick="cleardisplay('C')">C</button>
            <button onclick="input_data('')">&#40;</button>
            <button onclick="input_data('')">&#41;</button>
            <button class="opbuttons" onclick="input_data('/')">&#247;</button>
            <button onclick="input_data('7')">7</button>
            <button onclick="input_data('8')">8</button>
            <button onclick="input_data('9')">9</button>
            <button class="opbuttons" onclick="input_data('*')">x</button>
            <button onclick="input_data('4')">4</button>
            <button onclick="input_data('5')">5</button>
            <button onclick="input_data('6')">6</button>
            <button class="opbuttons" onclick="input_data('-')">-</button>
            <button onclick="input_data('1')">1</button>
            <button onclick="input_data('2')">2</button>
            <button onclick="input_data('3')">3</button>
            <button class="opbuttons" onclick="input_data('+')">+</button>
            <button onclick="input_data('0')">0</button>
            <button onclick="input_data('.')">.</button>
            <button onclick="del('DEL')">&larr;</button>
            <button class="equal" onclick="calc('=')">=</button>
        </div>
    </section>
</body>
</html>
